<!DOCTYPE html>
<html><head><title>Satoshi's Town - Tests</title></head>
<body style="background:#111;color:#eee;font-family:monospace;padding:20px;">
<h2>Satoshi's Town - Automated Tests</h2>
<div id="results"></div>
<script>
// Mock DOM
var _elements = {};
window.document_real = document;
var mockDoc = {
  addEventListener: function(){},
  activeElement: null,
  getElementById: function(id) { return _elements[id] || (_elements[id] = mockEl()); },
  createElement: function() { return mockEl(); },
  querySelectorAll: function() { return {forEach:function(){}}; },
  readyState: 'loading',
  body: { appendChild: function(){} }
};
function mockEl() {
  return {
    classList: {contains:function(){return false;},add:function(){},remove:function(){}},
    addEventListener:function(){}, querySelectorAll:function(){return{forEach:function(){}};},
    innerHTML:'', style:{}, textContent:'', id:'', className:'',
    appendChild:function(){}, getBoundingClientRect:function(){return{left:0,top:0};},
    focus:function(){}, blur:function(){}, onclick:null,
    getContext:function(){return{fillRect:function(){},clearRect:function(){},beginPath:function(){},moveTo:function(){},lineTo:function(){},stroke:function(){},fill:function(){},arc:function(){},ellipse:function(){},fillText:function(){},measureText:function(){return{width:50};},setLineDash:function(){},quadraticCurveTo:function(){},closePath:function(){},save:function(){},restore:function(){},translate:function(){},setTransform:function(){}}; },
    clientWidth:800, clientHeight:600, closest:function(){return null;},
    dataset: {}
  };
}
var _origDoc = window.document;
// We can't override document, so we'll test via loading scripts

var results = [];
var passed = 0, failed = 0;

function test(name, fn) {
  try {
    fn();
    results.push('<div style="color:#0f0;">PASS: ' + name + '</div>');
    passed++;
  } catch(e) {
    results.push('<div style="color:#f44;">FAIL: ' + name + ' - ' + e.message + '</div>');
    failed++;
  }
}

function assert(cond, msg) { if (!cond) throw new Error(msg || 'Assertion failed'); }

// Load game.js via fetch and eval in controlled env
Promise.all([
  fetch('game.js').then(r=>r.text()),
  fetch('town.js').then(r=>r.text()),
]).then(function(scripts) {
  // Set up minimal globals
  window.localStorage = { _d:{}, getItem:function(k){return this._d[k]||null;}, setItem:function(k,v){this._d[k]=v;}, removeItem:function(k){delete this._d[k];} };
  window.requestAnimationFrame = function(){};
  window.UI = { keys:{up:false,down:false,left:false,right:false}, panelOpen:false, modalActive:function(){return false;}, toast:function(){}, updateHUD:function(){}, updateOpenPanel:function(){} };

  eval(scripts[0]); // game.js
  eval(scripts[1]); // town.js

  // Init
  Game.init();
  Town.init(mockEl());
  Game.state.avatar = {name:'Test',sprite:'X',bonus:'quickhands',x:500,y:500};

  // ── Test Suite ──

  test('Game state initializes', function() {
    assert(Game.state.sats === 0);
    assert(Game.state.usd === 0);
    assert(Game.state.housing === 'studio');
    assert(Game.state.energy === 100);
  });

  test('Tap mine gives sats (quickhands bonus)', function() {
    Game.state.sats = 0;
    var gain = Game.tapMine();
    assert(gain === 6, 'Expected 6 (1+5 quickhands), got ' + gain); // 1 base + 5 quickhands
    assert(Game.state.sats === 6, 'Sats should be 6, got ' + Game.state.sats);
  });

  test('Buy laptop costs 15 sats', function() {
    Game.state.sats = 100;
    Game.state.owned.u1 = 0;
    var cost = Game.getBulkCost(Game.HARDWARE[0], 1);
    assert(cost === 15, 'Laptop cost should be 15, got ' + cost);
    var ok = Game.buyItem(Game.HARDWARE[0], 1);
    assert(ok, 'Should be able to buy');
    assert(Game.state.sats === 85, 'Should have 85 sats, got ' + Game.state.sats);
    assert(Game.state.owned.u1 === 1);
  });

  test('Cannot buy without enough sats', function() {
    Game.state.sats = 5;
    var ok = Game.buyItem(Game.HARDWARE[0], 1);
    assert(!ok, 'Should not be able to buy');
  });

  test('Rig slots limit purchases', function() {
    Game.state.sats = 1000000;
    Game.state.owned = {u1:0,u2:0,u3:0,u4:0,u5:0,u6:0,d1:0,d2:0,d3:0};
    Game.state.housing = 'studio'; // 3 slots
    Game.buyItem(Game.HARDWARE[0], 1); // 1 slot
    Game.buyItem(Game.HARDWARE[0], 1); // 2 slots
    Game.buyItem(Game.HARDWARE[0], 1); // 3 slots
    var ok = Game.buyItem(Game.HARDWARE[0], 1); // 4 slots - should fail
    assert(!ok, 'Should be blocked by slot limit');
    assert(Game.state.owned.u1 === 3, 'Should have 3 laptops, got ' + Game.state.owned.u1);
  });

  test('Housing upgrade increases slots', function() {
    Game.state.housing = 'apartment';
    assert(Game.getMaxSlots() === 8);
    Game.state.housing = 'house';
    assert(Game.getMaxSlots() === 20);
    Game.state.housing = 'solar';
    assert(Game.getMaxSlots() === 200);
  });

  test('Production rate calculates correctly', function() {
    Game.state.owned = {u1:2,u2:0,u3:0,u4:0,u5:0,u6:0,d1:0,d2:0,d3:0};
    var rate = Game.getProductionRate();
    assert(rate === 2, 'Expected 2 (2 laptops * 1/s), got ' + rate);
  });

  test('Multiplier with tokens', function() {
    Game.state.tokens = 5;
    Game.state.heat = 0;
    Game.state.energy = 100;
    Game.state.research = {};
    Game.state.pet = null;
    var mul = Game.getMultiplier();
    // 1 + 5*0.1 + 0.1(investor? no, quickhands) = 1.5
    assert(Math.abs(mul - 1.5) < 0.01, 'Expected 1.5, got ' + mul);
  });

  test('Heat penalty at 90+', function() {
    Game.state.heat = 95;
    var mul = Game.getMultiplier();
    assert(mul < 0.2, 'Should be heavily penalized, got ' + mul);
    Game.state.heat = 0;
  });

  test('Energy at 0 reduces multiplier', function() {
    Game.state.energy = 0;
    Game.state.tokens = 0;
    var mul = Game.getMultiplier();
    assert(mul < 0.1, 'Should be near zero, got ' + mul);
    Game.state.energy = 100;
  });

  test('Sell sats for USD', function() {
    Game.state.sats = 100000000; // 1 BTC
    Game.state.usd = 0;
    Game.state.price = 65000;
    Game.state.priceEvent = null;
    Game.state.research = {};
    Game.state.pet = null;
    var gain = Game.sellSats(0.5);
    assert(gain > 0, 'Should get USD');
    assert(Game.state.sats === 50000000, 'Should have half sats');
    assert(Game.state.usd > 30000, 'Should have ~$32500');
  });

  test('Price event changes effective price', function() {
    Game.state.price = 65000;
    Game.state.priceEvent = { type:'bull', mult:1.3, endsAt:Date.now()+60000, magnitude:30 };
    var ep = Game.getEffectivePrice();
    assert(ep > 80000, 'Bull should increase price, got ' + ep);
    Game.state.priceEvent = null;
  });

  test('Take and repay loan', function() {
    Game.state.usd = 0;
    Game.state.loans = [];
    var ok = Game.takeLoan('small');
    assert(ok, 'Should take loan');
    assert(Game.state.usd === 100, 'Should have $100');
    assert(Game.state.loans.length === 1);
    assert(Game.state.loans[0].owed === 105, 'Should owe $105');
    Game.state.usd = 200;
    ok = Game.repayLoan();
    assert(ok, 'Should repay');
    assert(Game.state.loans.length === 0);
  });

  test('Cannot take two loans', function() {
    Game.state.loans = [];
    Game.takeLoan('small');
    var ok = Game.takeLoan('medium');
    assert(!ok, 'Should not allow second loan');
    Game.state.loans = [];
  });

  test('Mail order creates pending delivery', function() {
    Game.state.sats = 100000;
    Game.state.owned.u1 = 0;
    Game.state.mailOrders = [];
    var ok = Game.orderItem(Game.HARDWARE[0]);
    assert(ok, 'Should place order');
    assert(Game.state.mailOrders.length === 1);
    assert(Game.state.mailOrders[0].itemId === 'u1');
  });

  test('Casino coin flip works', function() {
    Game.state.sats = 1000;
    var result = Game.coinFlip(100);
    assert(result !== null, 'Should return result');
    assert(result === 100 || result === -100, 'Should win or lose bet amount');
  });

  test('Casino rejects invalid bet', function() {
    Game.state.sats = 50;
    assert(Game.coinFlip(100) === null, 'Should reject bet > balance');
    assert(Game.coinFlip(0) === null, 'Should reject 0 bet');
  });

  test('Slot machine returns result', function() {
    Game.state.sats = 1000;
    var r = Game.slotMachine(100);
    assert(r !== null);
    assert(typeof r.mult === 'number');
    assert(typeof r.win === 'number');
  });

  test('Vehicle speed multiplier', function() {
    Game.state.vehicle = null;
    assert(Game.getSpeedMultiplier() === 1.0);
    Game.state.vehicle = 'car';
    assert(Game.getSpeedMultiplier() === 2.0);
    Game.state.vehicle = 'heli';
    assert(Game.getSpeedMultiplier() === 5.0);
    Game.state.vehicle = null;
  });

  test('Research bonuses apply', function() {
    Game.state.research = { overclock: true };
    Game.state.tokens = 0; Game.state.heat = 0; Game.state.energy = 100; Game.state.pet = null;
    var mul = Game.getMultiplier();
    assert(Math.abs(mul - 1.25) < 0.01, 'Overclock should give 1.25x, got ' + mul);
    Game.state.research = { overclock: true, quantum: true };
    mul = Game.getMultiplier();
    assert(Math.abs(mul - 2.5) < 0.01, 'Both should give 2.5x, got ' + mul);
    Game.state.research = {};
  });

  test('Pet bonuses - hamster tap', function() {
    Game.state.sats = 0;
    Game.state.pet = 'hamster';
    Game.state.tokens = 0;
    var gain = Game.tapMine(); // 1 + 5(quickhands) + 10(hamster) = 16
    assert(gain === 16, 'Expected 16, got ' + gain);
    Game.state.pet = null;
  });

  test('Electricity cost with solar farm = 0', function() {
    Game.state.housing = 'solar';
    assert(Game.getElectricityCost() === 0);
    Game.state.housing = 'studio';
  });

  test('Avatar movement works', function() {
    Game.state.avatar = {name:'Test',sprite:'X',bonus:'quickhands',x:500,y:500};
    Game.state.vehicle = null;
    var keys = {up:false,down:false,left:true,right:false};
    var startX = Game.state.avatar.x;
    Town.updateAvatar(0.1, keys);
    assert(Game.state.avatar.x < startX, 'Should move left');
  });

  test('Click-to-move works', function() {
    Game.state.avatar.x = 500; Game.state.avatar.y = 500;
    Town.moveTarget = {x:600, y:500};
    var keys = {up:false,down:false,left:false,right:false};
    Town.updateAvatar(0.1, keys);
    assert(Game.state.avatar.x > 500, 'Should move toward target');
  });

  test('Collision detection blocks overlap', function() {
    // Mining HQ is at 128,128 with w:256,h:192
    assert(Town.collidesBuilding(200, 200), 'Should collide inside building');
    assert(!Town.collidesBuilding(500, 500), 'Should not collide in open area');
  });

  test('Gym increases energy max', function() {
    Game.state.gymLevel = 0;
    assert(Game.getEnergyMax() === 100);
    Game.state.gymLevel = 3;
    assert(Game.getEnergyMax() === 160);
    Game.state.gymLevel = 0;
  });

  test('Tick runs without errors', function() {
    Game.state.sats = 1000; Game.state.usd = 100; Game.state.energy = 50;
    Game.state.owned = {u1:2,u2:0,u3:0,u4:0,u5:0,u6:0,d1:0,d2:0,d3:0};
    Game.state.loans = [{id:'small',amount:100,owed:105,takenAt:Date.now()}];
    Game.state.pet = 'snake';
    Game.state.mailOrders = [];
    // Run many ticks
    for (var i = 0; i < 100; i++) Game.tick(0.1);
    assert(Game.state.sats > 1000, 'Should have earned sats');
    assert(true, 'No errors during tick');
  });

  test('Format number works', function() {
    assert(Game.formatNumber(500) === '500');
    assert(Game.formatNumber(1500) === '1.5K');
    assert(Game.formatNumber(1500000) === '1.5M');
    assert(Game.formatNumber(2500000000) === '2.5B');
  });

  // Display results
  var el = document_real.getElementById('results');
  el.innerHTML = results.join('') + '<hr><div style="font-size:16px;font-weight:bold;margin-top:10px;color:' + (failed===0?'#0f0':'#f44') + ';">' + passed + ' passed, ' + failed + ' failed</div>';
});
</script>
</body></html>
