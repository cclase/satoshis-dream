<title>Satoshi's Dream — Building Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }
  
  #sidebar {
    width: 280px; min-width: 280px; background: #16213e; border-right: 1px solid #0f3460;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #sidebar h1 {
    padding: 16px; font-size: 16px; font-weight: 700; color: #f5a623;
    border-bottom: 1px solid #0f3460; letter-spacing: 0.5px;
    background: linear-gradient(135deg, #16213e 0%, #1a1a4e 100%);

  #sidebar h1 span { font-size: 11px; color: #8899aa; display: block; font-weight: 400; margin-top: 2px; }
  
  #building-list {
    flex: 1; overflow-y: auto; padding: 8px;
  }
  #building-list::-webkit-scrollbar { width: 6px; }
  #building-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
  
  .building-btn {
    display: block; width: 100%; padding: 10px 12px; margin-bottom: 4px;
    background: transparent; border: 1px solid transparent; border-radius: 6px;
    color: #c0c8d4; font-size: 13px; text-align: left; cursor: pointer;
    transition: all 0.15s;
  }
  .building-btn:hover { background: #1a2a4e; border-color: #0f3460; }
  .building-btn.active { background: #0f3460; border-color: #f5a623; color: #f5a623; }
  .building-btn .num { color: #667; font-size: 11px; margin-right: 6px; }
  
  #info-panel {
    padding: 12px; border-top: 1px solid #0f3460; background: #121d36; font-size: 12px;
  }
  #info-panel .label { color: #667; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
  #info-panel .value { color: #e0e0e0; margin-bottom: 8px; }
  #info-panel .purpose { color: #f5a623; font-style: italic; }
  
  #viewer {
    flex: 1; position: relative; background: #1a1a2e;
  }
  #viewer canvas { display: block; }
  
  #controls-bar {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; background: rgba(22,33,62,0.9); padding: 8px 16px;
    border-radius: 8px; border: 1px solid #0f3460;
  }
  .ctrl-btn {
    padding: 6px 14px; background: #0f3460; border: 1px solid #1a3a6e;
    border-radius: 4px; color: #c0c8d4; font-size: 12px; cursor: pointer;
  }
  .ctrl-btn:hover { background: #1a4a7e; color: #fff; }
  
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #f5a623; font-size: 14px;
  }
  
  #camera-info {
    position: absolute; top: 12px; right: 12px; font-size: 11px; color: #556;
  }

import * as THREE from 'three';

// ── Inline OrbitControls (minimal) ──
class OrbitControls {
  constructor(camera, domElement) {
    this.camera = camera;
    this.domElement = domElement;
    this.target = new THREE.Vector3();
    this.enableDamping = true;
    this.dampingFactor = 0.08;
    this.rotateSpeed = 0.8;
    this.zoomSpeed = 1.2;
    this.minDistance = 5;
    this.maxDistance = 80;
    this._spherical = new THREE.Spherical();
    this._sphericalDelta = new THREE.Spherical();
    this._scale = 1;
    this._isPointerDown = false;
    this._pointerStart = { x: 0, y: 0 };
    
    const offset = new THREE.Vector3();
    offset.copy(camera.position).sub(this.target);
    this._spherical.setFromVector3(offset);
    
    domElement.addEventListener('pointerdown', (e) => {
      this._isPointerDown = true;
      this._pointerStart.x = e.clientX;
      this._pointerStart.y = e.clientY;
    });
    domElement.addEventListener('pointermove', (e) => {
      if (!this._isPointerDown) return;
      const dx = e.clientX - this._pointerStart.x;
      const dy = e.clientY - this._pointerStart.y;
      this._sphericalDelta.theta -= dx * 0.005 * this.rotateSpeed;
      this._sphericalDelta.phi -= dy * 0.005 * this.rotateSpeed;
      this._pointerStart.x = e.clientX;
      this._pointerStart.y = e.clientY;
    });
    domElement.addEventListener('pointerup', () => { this._isPointerDown = false; });
    domElement.addEventListener('wheel', (e) => {
      if (e.deltaY > 0) this._scale *= 1.05;
      else this._scale /= 1.05;
    });
  }
  update() {
    this._spherical.theta += this._sphericalDelta.theta;
    this._spherical.phi += this._sphericalDelta.phi;
    this._spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, this._spherical.phi));
    this._spherical.radius *= this._scale;
    this._spherical.radius = Math.max(this.minDistance, Math.min(this.maxDistance, this._spherical.radius));
    
    if (this.enableDamping) {
      this._sphericalDelta.theta *= (1 - this.dampingFactor);
      this._sphericalDelta.phi *= (1 - this.dampingFactor);
    } else {
      this._sphericalDelta.set(0, 0, 0);
    }
    this._scale = 1;
    
    const offset = new THREE.Vector3();
    offset.setFromSpherical(this._spherical);
    this.camera.position.copy(this.target).add(offset);
    this.camera.lookAt(this.target);
  }
}

// ── GLB Loader (simple) ──
class SimpleGLBLoader {
  async load(arrayBuffer) {
    const view = new DataView(arrayBuffer);
    const jsonLen = view.getUint32(12, true);
    const jsonStr = new TextDecoder().decode(new Uint8Array(arrayBuffer, 20, jsonLen));
    const gltf = JSON.parse(jsonStr);
    
    let binData = null;
    if (arrayBuffer.byteLength > 20 + jsonLen) {
      const binChunkStart = 20 + jsonLen;
      const binLen = view.getUint32(binChunkStart, true);
      binData = arrayBuffer.slice(binChunkStart + 8, binChunkStart + 8 + binLen);
    }
    
    const group = new THREE.Group();
    if (!gltf.meshes) return group;
    
    for (const mesh of gltf.meshes) {
      for (const prim of mesh.primitives) {
        const geometry = new THREE.BufferGeometry();
        
        // Position
        if (prim.attributes.POSITION !== undefined) {
          const acc = gltf.accessors[prim.attributes.POSITION];
          const bv = gltf.bufferViews[acc.bufferView];
          const arr = new Float32Array(binData, bv.byteOffset || 0, acc.count * 3);
          geometry.setAttribute('position', new THREE.BufferAttribute(arr.slice(), 3));
        }
        
        // Normals
        if (prim.attributes.NORMAL !== undefined) {
          const acc = gltf.accessors[prim.attributes.NORMAL];
          const bv = gltf.bufferViews[acc.bufferView];
          const arr = new Float32Array(binData, bv.byteOffset || 0, acc.count * 3);
          geometry.setAttribute('normal', new THREE.BufferAttribute(arr.slice(), 3));
        }
        
        // Indices
        if (prim.indices !== undefined) {
          const acc = gltf.accessors[prim.indices];
          const bv = gltf.bufferViews[acc.bufferView];
          let arr;
          if (acc.componentType === 5123) {
            arr = new Uint16Array(binData, bv.byteOffset || 0, acc.count);
          } else {
            arr = new Uint32Array(binData, bv.byteOffset || 0, acc.count);
          }
          geometry.setIndex(new THREE.BufferAttribute(arr.slice(), 1));
        }
        
        // Color
        let color = new THREE.Color(0.7, 0.7, 0.7);
        if (prim.material !== undefined && gltf.materials) {
          const mat = gltf.materials[prim.material];
          if (mat.pbrMetallicRoughness && mat.pbrMetallicRoughness.baseColorFactor) {
            const c = mat.pbrMetallicRoughness.baseColorFactor;
            color = new THREE.Color(c[0], c[1], c[2]);
          }
        }
        
        // Colors from vertex colors
        if (prim.attributes.COLOR_0 !== undefined) {
          const acc = gltf.accessors[prim.attributes.COLOR_0];
          const bv = gltf.bufferViews[acc.bufferView];
          let arr;
          if (acc.componentType === 5126) {
            arr = new Float32Array(binData, bv.byteOffset || 0, acc.count * (acc.type === 'VEC4' ? 4 : 3));
          } else if (acc.componentType === 5121) {
            const raw = new Uint8Array(binData, bv.byteOffset || 0, acc.count * (acc.type === 'VEC4' ? 4 : 3));
            arr = new Float32Array(raw.length);
            for (let i = 0; i < raw.length; i++) arr[i] = raw[i] / 255;
          }
          const stride = acc.type === 'VEC4' ? 4 : 3;
          const rgb = new Float32Array(acc.count * 3);
          for (let i = 0; i < acc.count; i++) {
            rgb[i*3] = arr[i*stride];
            rgb[i*3+1] = arr[i*stride+1];
            rgb[i*3+2] = arr[i*stride+2];
          }
          geometry.setAttribute('color', new THREE.BufferAttribute(rgb, 3));
        }
        
        if (!geometry.attributes.normal) geometry.computeVertexNormals();
        
        const hasVertexColors = !!geometry.attributes.color;
        const material = new THREE.MeshStandardMaterial({
          color: hasVertexColors ? 0xffffff : color,
          vertexColors: hasVertexColors,
          metalness: 0.1,
          roughness: 0.75,
          flatShading: true,
        });
        
        const m = new THREE.Mesh(geometry, material);
        group.add(m);
      }
    }
    
    // Apply node transforms
    if (gltf.nodes) {
      for (const node of gltf.nodes) {
        if (node.translation) {
          // We'd need to match nodes to meshes properly; 
          // trimesh exports are simple enough this mostly works
        }
      }
    }
    
    return group;
  }
}

  btn.className = 'building-btn';
  btn.id = 'btn-' + key;
  btn.innerHTML = '<span class="num">' + (i+1) + '.</span> ' + MODEL_DATA[key].name;
  btn.onclick = () => loadModel(key);
  listEl.appendChild(btn);
});

// ── Load Model ──
async function loadModel(key) {
  const info = MODEL_DATA[key];
  if (!info) return;
  
  // Update sidebar active state
  document.querySelectorAll('.building-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + key).classList.add('active');
  currentIndex = modelKeys.indexOf(key);
  
  // Update info panel
  const spec = SPEC_INFO[key] || {};
  document.getElementById('info-purpose').textContent = spec.purpose || '—';
  document.getElementById('info-size').textContent = spec.size || '—';
  document.getElementById('info-color').textContent = spec.color || '—';
  document.getElementById('info-file').textContent = key + '.glb';
  
  // Remove old model
  if (currentModel) {
    scene.remove(currentModel);
    currentModel.traverse(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) child.material.dispose();
    });
  }
  
  // Decode base64 to ArrayBuffer
  const binary = atob(info.data);
  const buffer = new ArrayBuffer(binary.length);
  const view = new Uint8Array(buffer);
  for (let i = 0; i < binary.length; i++) view[i] = binary.charCodeAt(i);
  
  try {
    const group = await loader.load(buffer);
    currentModel = group;
    scene.add(group);
    
    // Auto-fit camera
    const box = new THREE.Box3().setFromObject(group);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    
    controls.target.copy(center);
    const dist = maxDim * 2;
    camera.position.set(center.x + dist * 0.7, center.y + dist * 0.5, center.z + dist * 0.7);
    
    document.getElementById('loading').style.display = 'none';
  } catch(e) {
    console.error('Load error:', e);
  }
}

// ── Controls ──
window.resetCamera = function() {
  if (!currentModel) return;
  const box = new THREE.Box3().setFromObject(currentModel);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  controls.target.copy(center);
  camera.position.set(center.x + maxDim * 1.4, center.y + maxDim, center.z + maxDim * 1.4);
};

window.toggleWireframe = function() {
  wireframeMode = !wireframeMode;
  if (currentModel) {
    currentModel.traverse(child => {
      if (child.material) child.material.wireframe = wireframeMode;
    });
  }
};

window.cycleNext = function(dir) {
  currentIndex = (currentIndex + dir + modelKeys.length) % modelKeys.length;
  loadModel(modelKeys[currentIndex]);
};

window.toggle45 = function() {
  if (!currentModel) return;
  const box = new THREE.Box3().setFromObject(currentModel);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  controls.target.copy(center);
  const dist = maxDim * 2;
  camera.position.set(center.x + dist, center.y + dist * 0.8, center.z + dist * 0.3);
};

// ── Animation Loop ──
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = viewer.clientWidth / viewer.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(viewer.clientWidth, viewer.clientHeight);
});

// Load first building
loadModel(modelKeys[0]);
</script>
</body>
