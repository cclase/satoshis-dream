<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f7931a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Satoshi's Dream</title>
  <meta name="description" content="Bitcoin mining idle game - build your crypto empire from scratch">
  <meta property="og:title" content="Satoshi's Dream">
  <meta property="og:description" content="Bitcoin mining idle game - build your crypto empire from scratch">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="loading-screen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a2e;display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column;">
    <div style="color:#f7931a;font-family:monospace;font-size:24px;font-weight:bold;margin-bottom:16px;">Satoshi's Dream</div>
    <div style="color:#aaa;font-family:monospace;font-size:14px;" id="loading-status">Loading...</div>
    <div style="width:200px;height:4px;background:#333;border-radius:2px;margin-top:12px;overflow:hidden;">
      <div id="loading-bar" style="width:0%;height:100%;background:#f7931a;transition:width 0.3s;"></div>
    </div>
  </div>
  <canvas id="town" tabindex="0"></canvas>
  <div id="hud"></div>
  <div id="panel"></div>
  <div id="modal"></div>
  <div id="dpad"></div>
  <div id="nav-menu-btn">&#x1F5FA;&#xFE0F;</div>
  <div id="nav-menu"></div>
  <div id="toast"></div>
  <script src="babylon.min.js"></script>
  <script src="babylonjs.loaders.js"></script>
  <script src="audio.js"></script>
  <script src="game.js"></script>
  <script src="town.js"></script>
  <script src="ui.js"></script>
</body>
</html>
